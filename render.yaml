services:
  - type: web
    name: cherry-bot
    runtime: node
    region: oregon
    plan: free
    healthCheckPath: /health
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MASTER_SEED
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: PAYMENT_SOL_ADDRESS
        sync: false
      - key: PAYMENT_ETH_ADDRESS
        sync: false
